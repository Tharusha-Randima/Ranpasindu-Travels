<body onload="checkAccess('admin'); displayReports()">
    
    <nav class="navbar">
        <span><H1 style="text-align: center;">Admin Dashboard</H1></span>
        <button onclick="logout()" class="logout-btn" style="align-content: center;">Logout</button>
    </nav>

    <div class="container">
        <div class="dashboard-card">
            <h3>Daily Business Reports</h3>
            <div class="table-container">
                <table id="reportsTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Driver</th>
                            <th>Total Income</th>
                            <th>Total Expenses</th>
                            <th>Net Profit</th>
                        </tr>
                    </thead>
                    <tbody id="reportsBody">
                        </tbody>
                </table>
            </div>
            <button class="btn btn-red" onclick="clearData()" style="margin-top: 20px;">Clear All History</button>
        </div>
    </div>

    <script src="app.js"></script>

    <div class="summary-grid">
    <div class="summary-box">
        <h4>Total Revenue</h4>
        <p id="totalRevenue">0 LKR</p>
    </div>
    <div class="summary-box">
        <h4>Total Profit</h4>
        <p id="totalProfit">0 LKR</p>
    </div>
    </div>

    <button class="btn btn-green" onclick="exportToCSV()">Export to Excel (CSV)</button>
