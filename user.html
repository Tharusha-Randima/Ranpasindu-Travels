<body onload="checkAccess('user')"> <nav class="navbar">
        <span id="welcomeUser" style="text-align: center;"><h1>Bus Entry</h1></span></br>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </nav>

    <div class="container">
        <div class="entry-card">
            <h3>Daily Income & Expenses</h3>
            <form id="busEntryForm">
                <label>Driver Name</label>
                <input type="text" id="driverName" placeholder="Enter name" required>

                <hr>
                <h4>Trip Income (LKR)</h4>
                <div class="grid-inputs">
                    <div><label>7:00 AM</label><input type="number" id="turn1" placeholder="0"></div>
                    <div><label>8:00 AM</label><input type="number" id="turn2" placeholder="0"></div>
                    <div><label>9:30 AM</label><input type="number" id="turn3" placeholder="0"></div>
                    <div><label>2:10 PM</label><input type="number" id="turn4" placeholder="0"></div>
                    <div><label>3:30 PM</label><input type="number" id="turn5" placeholder="0"></div>
                    <div><label>5:10 PM</label><input type="number" id="turn6" placeholder="0"></div>
                </div>

                <hr>
                <h4>Daily Expenses</h4>
                <label>Fuel Cost</label>
                <input type="number" id="fuelCost" placeholder="0">
                
                <label>Food/Meals</label>
                <input type="number" id="foodCost" placeholder="0">

                <label>Other Expense 1 (e.g. Wash/Service)</label>
                <input type="number" id="other1" placeholder="0">

                <label>Other Expense 2 (e.g. Repairs)</label>
                <input type="number" id="other2" placeholder="0">

                <button type="submit" class="btn">Submit Daily Report</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
